name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: delupe_test
          POSTGRES_USER: del
          POSTGRES_PASSWORD: delupe123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U del -d delupe_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: delupe_test
          DB_USERNAME: del
          DB_PASSWORD: delupe123
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST:  postgres
          DB_PORT: 5432
          DB_USERNAME: del
          DB_PASSWORD: delupe123
          DB_DATABASE: 'delupe_test'
          API_KEY: test_api_key
        run: php artisan test

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

      - name: Run Laravel Pint (coding standards)
        run: vendor/bin/pint --test
