services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delupe_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_NAME: Delupe
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: delupe_db
      DB_USERNAME: del
      DB_PASSWORD: delupe123
      API_KEY: your_api_key1
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: delupe_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: delupe_db
      POSTGRES_USER: del
      POSTGRES_PASSWORD: delupe123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U del -d delupe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
